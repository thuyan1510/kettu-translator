name: Build Kettu Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Build plugin
        run: bun run build
      - uses: actions/upload-artifact@v4
        with:
          name: kettu-translator
          path: dist/index.js
